# DO NOT commit real secrets — use external secrets manager or sealed-secrets in production
apiVersion: v1
kind: Secret
metadata:
  name: investment-secrets
  namespace: investment-system
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
  NEWS_API_KEY: "REPLACE_ME"
  POSTGRES_USER: "invest_user"
  POSTGRES_PASSWORD: "REPLACE_ME"
  DATABASE_URL: "postgresql://invest_user:REPLACE_ME@postgres-service:5432/investment_db"
  DATABASE_URL_ASYNC: "postgresql+asyncpg://invest_user:REPLACE_ME@postgres-service:5432/investment_db"
  GRAFANA_PASSWORD: "REPLACE_ME"
