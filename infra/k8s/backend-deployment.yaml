apiVersion: apps/v1
kind: Deployment
metadata:
  name: investment-backend
  namespace: investment-system
  labels:
    app: investment-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: investment-backend
  template:
    metadata:
      labels:
        app: investment-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: gcr.io/PROJECT_ID/investment-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: investment-config
            - secretRef:
                name: investment-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
